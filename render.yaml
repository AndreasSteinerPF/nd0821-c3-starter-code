services:
  - type: web
    name: census-income-api
    runtime: python
    plan: free
    rootDir: starter
    buildCommand: pip install -r requirements.txt && python -m starter.train_model
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
